# Minimal tmux config: keep the normal terminal look
set -g status off

# Match your outside terminal ($TERM = xterm-256color) and keep truecolor
set -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB"
set-environment -g COLORTERM "truecolor"
set-environment -g LANG "C.utf8"
set-environment -g LC_CTYPE "C.utf8"
